            .district.selected { fill: #ef1f2d; stroke: #991b1b; stroke-width: 2.5; filter: drop-shadow(0 0 8px rgba(239,31,45,0.5)); }
            .district-label { font-size: 8px; font-family: Arial, sans-serif; text-anchor: middle; fill: #1e293b; pointer-events: none; font-weight: 600; }
            .district-label.selected { fill: white; }
