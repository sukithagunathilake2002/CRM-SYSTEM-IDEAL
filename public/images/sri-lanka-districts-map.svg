<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 850" width="100%" height="100%">
    <defs>
        <style>
            .district {
                fill: #e2e8f0;
                stroke: #1e293b;
                stroke-width: 1.5;
                cursor: pointer;
                transition: all 0.3s ease;
            }
            .district:hover {
                fill: #f87171;
                stroke: #dc2626;
                stroke-width: 2;
            }
            .district.selected {
                fill: #ef1f2d;
                stroke: #991b1b;
                stroke-width: 2.5;
            }
            .district-label {
                font-size: 7px;
                font-family: Arial, sans-serif;
                text-anchor: middle;
                fill: #1e293b;
                pointer-events: none;
                font-weight: 600;
            }
            .district-label.selected {
                fill: white;
            }
        </style>
    </defs>

    <!-- Northern Province -->
